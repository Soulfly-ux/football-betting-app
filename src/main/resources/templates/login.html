<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login · Football Betting App</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body>
<div class="page-wrapper">

    <header class="navbar">
        <div class="container navbar-inner">
            <div class="nav-logo">
                <div class="nav-logo-badge">
                    FB
                </div>
                <div class="nav-logo-text">
                    <div class="nav-logo-main">Football Betting</div>
                    <div class="nav-logo-sub">Demo Portfolio Project</div>
                </div>
            </div>
            <nav class="nav-links">
                <a class="nav-link" th:href="@{/home}">Home</a>
                <a class="nav-link" th:href="@{/matches}">Matches</a>
                <a class="btn btn-primary" th:href="@{/register}">Sign up</a>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">
                Log in to manage your bets and explore upcoming matches.
                <br>
                New here?
                <a th:href="@{/register}">Create an account</a>.
            </p>

            <!-- Тук можеш да покажеш грешка от Thymeleaf/Spring Security -->
            <div th:if="${param.error}" class="form-error" style="margin-bottom:0.7rem;">
                Invalid username or password.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input id="username" name="username" type="text"
                               class="form-control" autocomplete="username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" name="password" type="password"
                               class="form-control" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-footer">
                    <div class="checkbox-row">
                        <input id="remember-me" name="remember-me" type="checkbox">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Log in
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            Need a demo user? Configure one in your Spring Security setup.
        </div>
    </footer>
</div>
</body>
</html>
